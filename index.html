<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- cache-bust: v8-complete -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Pixel Brawl — 2D Fighting Game</title>
  <meta name="description" content="AAA-quality 2D fighting game with 4 unique fighters, daily challenges, and arcade high scores. Built for Meta display glasses." />

  <!-- Open Graph -->
  <meta property="og:title" content="Pixel Brawl" />
  <meta property="og:description" content="AAA 2D fighting game with 4 fighters, daily challenges, win streaks, and arcade high scores. Play now!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mrtsm.github.io/raybans-fighter/" />
  <meta property="og:image" content="https://mrtsm.github.io/raybans-fighter/assets/sprites/title_bg.png" />
  <meta property="og:image:width" content="600" />
  <meta property="og:image:height" content="600" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pixel Brawl" />
  <meta name="twitter:description" content="AAA 2D fighting game. 4 fighters, daily challenges, win streaks." />
  <meta name="twitter:image" content="https://mrtsm.github.io/raybans-fighter/assets/sprites/title_bg.png" />

  <!-- Futuristic display font for neon HUD/UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root{
      --bg0:#03040a;
      --bg1:#071022;
      --bg2:#050813;
    }

    html,body{margin:0;height:100%;}
    body{
      background:
        radial-gradient(1200px 800px at 50% 20%, rgba(45,180,255,0.16), transparent 60%),
        radial-gradient(900px 700px at 20% 80%, rgba(180,90,255,0.12), transparent 62%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 55%, var(--bg2));
      color:#fff;
      font-family: Impact, 'Arial Black', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
    }

    #wrap{display:flex;align-items:center;justify-content:center;height:100%;}

    canvas{
      width:min(600px,100vw);
      height:min(600px,100vh);
      image-rendering:auto;
      touch-action:none;
      filter: drop-shadow(0 14px 26px rgba(0,0,0,0.55));
      border-radius: 14px;
    }

    /* Subtle bezel */
    #wrap::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(600px 520px at 50% 50%, rgba(255,255,255,0.06), transparent 70%),
        radial-gradient(900px 700px at 50% 50%, rgba(0,0,0,0.55), transparent 62%);
      mix-blend-mode: overlay;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="600" height="600"></canvas></div>
  <script type="module">
    import { boot } from './js/engine.js';
    boot(document.getElementById('game'));
  </script>
</body>
</html>
